      <ellipse cx="73" cy="73" rx="45" ry="16" fill="none" stroke="#38d5ff" stroke-width="5" transform="rotate(-31 73 73)"/>
      <ellipse cx="73" cy="73" rx="45" ry="16" fill="none" stroke="#8be8ff" stroke-width="4" transform="rotate(31 73 73)" opacity="0.8"/>
      <ellipse cx="73" cy="73" rx="18" ry="45" fill="none" stroke="#58a6ff" stroke-width="4" opacity="0.9"/>
