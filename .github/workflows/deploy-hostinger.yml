name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate PHP
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Lint PHP
        run: php -l index.php

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    env:
      HOSTINGER_WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
      HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_SERVER_DIR: ${{ secrets.HOSTINGER_FTP_SERVER_DIR || '/public_html/' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger Hostinger Git deployment
        if: env.HOSTINGER_WEBHOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$HOSTINGER_WEBHOOK_URL"

      - name: Deploy via FTP
        if: env.HOSTINGER_FTP_SERVER != '' && env.HOSTINGER_FTP_USERNAME != '' && env.HOSTINGER_FTP_PASSWORD != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.HOSTINGER_FTP_SERVER }}
          username: ${{ env.HOSTINGER_FTP_USERNAME }}
          password: ${{ env.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ env.HOSTINGER_FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/docs/**

      - name: Deployment configuration notice
        if: env.HOSTINGER_WEBHOOK_URL == '' && (env.HOSTINGER_FTP_SERVER == '' || env.HOSTINGER_FTP_USERNAME == '' || env.HOSTINGER_FTP_PASSWORD == '')
        run: echo "No Hostinger deployment secrets configured. Add HOSTINGER_WEBHOOK_URL or FTP secrets to enable automatic deployment."
